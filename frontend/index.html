<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <title>Codebase Explainer — understand any codebase in plain language</title>
    <meta
      name="description"
      content="The AI toolkit for explaining, planning, and securing any codebase — from a solo script to a production monorepo. Get a plain-language explanation, a phased plan, an architecture diagram, and a security audit in minutes."
    />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / social previews (Twitter, Reddit, HN, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Codebase Explainer" />
    <meta property="og:title" content="Codebase Explainer — understand any codebase in plain language" />
    <meta
      property="og:description"
      content="Point it at a local directory or a public GitHub repo and get a difficulty-tiered explanation, a phased plan, a Mermaid architecture diagram, and an AI security audit."
    />
    <meta property="og:image" content="/og-image.png" />
    <!--
      TODO once deployed: replace with the real production origin, e.g.
      <link rel="canonical" href="https://your-domain.com/" />
      <meta property="og:url" content="https://your-domain.com/" />
      og:image above also needs an actual 1200x630 PNG dropped at
      frontend/public/og-image.png — not generated here, this only wires the tag.
    -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Codebase Explainer — understand any codebase in plain language" />
    <meta
      name="twitter:description"
      content="AI-generated explanation, phased plan, architecture diagram, and security audit for any codebase."
    />
    <meta name="twitter:image" content="/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
