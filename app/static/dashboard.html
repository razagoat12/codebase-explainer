<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Analyses — Codebase Explainer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6">
  <div class="max-w-2xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <div>
        <a href="/" class="text-sm text-gray-400 hover:text-gray-600 mb-1 block">← Back</a>
        <h1 class="text-2xl font-bold text-gray-800">My Analyses</h1>
      </div>
      <button onclick="logout()" class="text-sm text-gray-400 hover:text-gray-700">Logout</button>
    </div>

    <div id="loading" class="text-center text-gray-400 py-16">Loading…</div>
    <div id="empty" class="hidden text-center text-gray-400 py-16">
      No analyses yet. <a href="/" class="text-gray-700 underline">Start one</a>.
    </div>
    <div id="list" class="hidden space-y-3"></div>
  </div>

<script>
  const API = '';

  function token() { return localStorage.getItem('token'); }
  function logout() { localStorage.removeItem('token'); window.location.href = '/'; }

  const STATUS_STYLE = {
    done:       'bg-green-100 text-green-700',
    processing: 'bg-blue-100 text-blue-700',
    pending:    'bg-yellow-100 text-yellow-700',
    error:      'bg-red-100 text-red-600',
  };

  const SOURCE_ICON = {
    github: '⌥',
    local:  '📁',
  };

  async function load() {
    if (!token()) { window.location.href = '/'; return; }

    const res = await fetch(API + '/analyze/history', {
      headers: { 'Authorization': `Bearer ${token()}` },
    });

    document.getElementById('loading').classList.add('hidden');

    if (!res.ok) { logout(); return; }

    const items = await res.json();

    if (!items.length) {
      document.getElementById('empty').classList.remove('hidden');
      return;
    }

    const list = document.getElementById('list');
    list.classList.remove('hidden');

    list.innerHTML = items.map(item => {
      const status = item.status;
      const badge = STATUS_STYLE[status] || 'bg-gray-100 text-gray-600';
      const icon = SOURCE_ICON[item.source_type] || '📁';
      const label = item.directory_path.length > 55
        ? '…' + item.directory_path.slice(-52) : item.directory_path;
      const date = new Date(item.created_at).toLocaleString();

      return `
        <a href="/result.html?id=${item.id}"
           class="block bg-white rounded-xl shadow-sm border border-gray-100 p-5 hover:border-gray-300 transition">
          <div class="flex justify-between items-start gap-3">
            <div class="min-w-0">
              <p class="text-sm font-medium text-gray-800 truncate">${icon} ${label}</p>
              <p class="text-xs text-gray-400 mt-1">${date}</p>
            </div>
            <span class="shrink-0 text-xs font-medium px-2.5 py-1 rounded-full ${badge}">${status}</span>
          </div>
        </a>`;
    }).join('');
  }

  load();
</script>
</body>
</html>
